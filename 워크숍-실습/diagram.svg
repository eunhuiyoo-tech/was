<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stage-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 14px;
        font-weight: 600;
        text-anchor: middle;
        fill: #333;
      }

      .stage-label {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 12px;
        text-anchor: middle;
        fill: #666;
      }

      .arrow-head {
        fill: #999;
      }
    </style>

    <!-- 화살표 마커 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head" />
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="200" fill="#f9f9f9" rx="8" />

  <!-- 1단계: 기획 -->
  <rect x="30" y="50" width="100" height="100" fill="#E8B4C8" rx="12" ry="12" />
  <text x="80" y="105" class="stage-text">기획</text>

  <!-- 화살표 1 -->
  <line x1="135" y1="100" x2="155" y2="100" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 2단계: 제작 -->
  <rect x="165" y="50" width="100" height="100" fill="#B4D8E8" rx="12" ry="12" />
  <text x="215" y="105" class="stage-text">제작</text>

  <!-- 화살표 2 -->
  <line x1="270" y1="100" x2="290" y2="100" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 3단계: 검토 -->
  <rect x="300" y="50" width="100" height="100" fill="#C8E8B4" rx="12" ry="12" />
  <text x="350" y="105" class="stage-text">검토</text>

  <!-- 화살표 3 -->
  <line x1="405" y1="100" x2="425" y2="100" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 4단계: 배포 -->
  <rect x="435" y="50" width="100" height="100" fill="#E8E0B4" rx="12" ry="12" />
  <text x="485" y="105" class="stage-text">배포</text>

  <!-- 화살표 4 -->
  <line x1="540" y1="100" x2="560" y2="100" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 5단계: 분석 -->
  <rect x="570" y="50" width="100" height="100" fill="#E8C8B4" rx="12" ry="12" />
  <text x="620" y="105" class="stage-text">분석</text>

  <!-- 단계 번호 표시 (하단) -->
  <text x="80" y="170" class="stage-label">01</text>
  <text x="215" y="170" class="stage-label">02</text>
  <text x="350" y="170" class="stage-label">03</text>
  <text x="485" y="170" class="stage-label">04</text>
  <text x="620" y="170" class="stage-label">05</text>
</svg>