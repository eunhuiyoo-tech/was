<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 분석 대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .chart-wrapper {
            background: #fafbfc;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e8eef5;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .axis-label {
            font-size: 12px;
            fill: #666;
        }

        .axis-line {
            stroke: #ddd;
            stroke-width: 2;
        }

        .grid-line {
            stroke: #eee;
            stroke-width: 1;
            stroke-dasharray: 4,4;
        }

        .tooltip {
            position: absolute;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .stats-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .stats-section {
                grid-template-columns: repeat(2, 1fr);
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 매출 분석 대시보드</h1>
            <p>2026년 월별 매출 추이 및 제품별 성과</p>
        </header>

        <div class="charts-grid">
            <div class="chart-wrapper">
                <div class="chart-title">월별 매출 추이</div>
                <svg id="lineChart" viewBox="0 0 500 300" style="border: 1px solid #e8eef5; border-radius: 4px;"></svg>
            </div>
            <div class="chart-wrapper">
                <div class="chart-title">제품별 매출 비교</div>
                <svg id="barChart" viewBox="0 0 500 300" style="border: 1px solid #e8eef5; border-radius: 4px;"></svg>
            </div>
        </div>

        <div class="stats-section" id="statsSection"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        const csvData = `날짜,제품,카테고리,수량,단가,매출액,지역
2026-01-05,무선 이어폰,전자기기,45,89000,4005000,서울
2026-01-05,보조배터리,전자기기,32,35000,1120000,서울
2026-01-05,텀블러,생활용품,78,25000,1950000,부산
2026-01-08,무선 이어폰,전자기기,52,89000,4628000,서울
2026-01-08,블루투스 스피커,전자기기,18,120000,2160000,대구
2026-01-08,텀블러,생활용품,65,25000,1625000,서울
2026-01-12,보조배터리,전자기기,41,35000,1435000,부산
2026-01-12,무선 충전기,전자기기,29,45000,1305000,서울
2026-01-12,에코백,생활용품,93,15000,1395000,대구
2026-01-15,무선 이어폰,전자기기,38,89000,3382000,부산
2026-01-15,블루투스 스피커,전자기기,22,120000,2640000,서울
2026-01-15,텀블러,생활용품,84,25000,2100000,서울
2026-01-19,보조배터리,전자기기,55,35000,1925000,대구
2026-01-19,에코백,생활용품,110,15000,1650000,서울
2026-01-19,무선 충전기,전자기기,33,45000,1485000,부산
2026-01-22,무선 이어폰,전자기기,61,89000,5429000,서울
2026-01-22,텀블러,생활용품,72,25000,1800000,대구
2026-01-22,블루투스 스피커,전자기기,15,120000,1800000,부산
2026-01-26,보조배터리,전자기기,48,35000,1680000,서울
2026-01-26,에코백,생활용품,88,15000,1320000,서울
2026-01-26,무선 충전기,전자기기,37,45000,1665000,대구
2026-02-01,무선 이어폰,전자기기,70,89000,6230000,서울
2026-02-01,텀블러,생활용품,95,25000,2375000,부산
2026-02-01,보조배터리,전자기기,43,35000,1505000,서울
2026-02-05,블루투스 스피커,전자기기,25,120000,3000000,서울
2026-02-05,에코백,생활용품,120,15000,1800000,대구
2026-02-05,무선 충전기,전자기기,31,45000,1395000,부산
2026-02-10,무선 이어폰,전자기기,58,89000,5162000,대구
2026-02-10,텀블러,생활용품,67,25000,1675000,서울
2026-02-10,보조배터리,전자기기,39,35000,1365000,서울`;

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const obj = {};
                const values = lines[i].split(',');
                headers.forEach((header, idx) => {
                    obj[header] = values[idx];
                });
                data.push(obj);
            }
            return data;
        }

        function processData(rawData) {
            const monthlyData = {};
            const productData = {};

            rawData.forEach(row => {
                const date = row['날짜'];
                const month = date.substring(0, 7);
                const product = row['제품'];
                const sales = parseInt(row['매출액']);

                if (!monthlyData[month]) monthlyData[month] = 0;
                monthlyData[month] += sales;

                if (!productData[product]) productData[product] = 0;
                productData[product] += sales;
            });

            return {
                monthly: monthlyData,
                product: productData
            };
        }

        function drawLineChart(monthlyData) {
            const svg = document.getElementById('lineChart');
            const padding = 50;
            const width = 500;
            const height = 300;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;

            const months = Object.keys(monthlyData).sort();
            const values = months.map(m => monthlyData[m]);
            const maxValue = Math.max(...values);
            const minValue = 0;

            const colors = {
                line: '#667eea',
                fill: 'rgba(102, 126, 234, 0.1)',
                point: '#667eea',
                pointHover: '#764ba2'
            };

            svg.innerHTML = '';

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            gradient.setAttribute('id', 'lineGradient');
            gradient.setAttribute('x1', '0%');
            gradient.setAttribute('y1', '0%');
            gradient.setAttribute('x2', '0%');
            gradient.setAttribute('y2', '100%');

            const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop1.setAttribute('offset', '0%');
            stop1.setAttribute('stop-color', colors.point);
            stop1.setAttribute('stop-opacity', '0.3');

            const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop2.setAttribute('offset', '100%');
            stop2.setAttribute('stop-color', colors.point);
            stop2.setAttribute('stop-opacity', '0');

            gradient.appendChild(stop1);
            gradient.appendChild(stop2);
            defs.appendChild(gradient);
            svg.appendChild(defs);

            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight / 4) * i;
                const gridLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                gridLine.setAttribute('x1', padding);
                gridLine.setAttribute('x2', width - padding);
                gridLine.setAttribute('y1', y);
                gridLine.setAttribute('y2', y);
                gridLine.setAttribute('class', 'grid-line');
                svg.appendChild(gridLine);

                const value = maxValue - (maxValue / 4) * i;
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', padding - 10);
                label.setAttribute('y', y + 4);
                label.setAttribute('text-anchor', 'end');
                label.setAttribute('class', 'axis-label');
                label.textContent = formatNumber(Math.round(value));
                svg.appendChild(label);
            }

            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', padding);
            xAxis.setAttribute('x2', width - padding);
            xAxis.setAttribute('y1', height - padding);
            xAxis.setAttribute('y2', height - padding);
            xAxis.setAttribute('class', 'axis-line');
            svg.appendChild(xAxis);

            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', padding);
            yAxis.setAttribute('x2', padding);
            yAxis.setAttribute('y1', padding);
            yAxis.setAttribute('y2', height - padding);
            yAxis.setAttribute('class', 'axis-line');
            svg.appendChild(yAxis);

            let pathData = `M ${padding} ${height - padding - ((values[0] - minValue) / (maxValue - minValue)) * chartHeight}`;

            for (let i = 1; i < months.length; i++) {
                const x = padding + (chartWidth / (months.length - 1)) * i;
                const y = height - padding - ((values[i] - minValue) / (maxValue - minValue)) * chartHeight;
                pathData += ` L ${x} ${y}`;
            }

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathData);
            path.setAttribute('stroke', colors.line);
            path.setAttribute('stroke-width', '3');
            path.setAttribute('fill', 'none');
            svg.appendChild(path);

            values.forEach((value, idx) => {
                const x = padding + (chartWidth / (months.length - 1)) * idx;
                const y = height - padding - ((value - minValue) / (maxValue - minValue)) * chartHeight;

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', '5');
                circle.setAttribute('fill', colors.point);
                circle.setAttribute('stroke', 'white');
                circle.setAttribute('stroke-width', '2');
                circle.style.cursor = 'pointer';

                circle.addEventListener('mouseenter', (e) => {
                    circle.setAttribute('r', '7');
                    showTooltip(e, `${months[idx]}: ${formatNumber(value)}원`);
                });
                circle.addEventListener('mouseleave', () => {
                    circle.setAttribute('r', '5');
                    hideTooltip();
                });

                svg.appendChild(circle);

                const monthLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                monthLabel.setAttribute('x', x);
                monthLabel.setAttribute('y', height - padding + 20);
                monthLabel.setAttribute('text-anchor', 'middle');
                monthLabel.setAttribute('class', 'axis-label');
                monthLabel.textContent = months[idx].slice(-2) + '월';
                svg.appendChild(monthLabel);
            });
        }

        function drawBarChart(productData) {
            const svg = document.getElementById('barChart');
            const padding = 50;
            const width = 500;
            const height = 300;
            const chartWidth = width - 2 * padding;
            const chartHeight = height - 2 * padding;

            const products = Object.keys(productData).sort();
            const values = products.map(p => productData[p]);
            const maxValue = Math.max(...values);

            const colors = ['#667eea', '#27ae60', '#2980b9', '#16a085', '#8e44ad', '#d35400'];

            svg.innerHTML = '';

            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight / 4) * i;
                const gridLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                gridLine.setAttribute('x1', padding);
                gridLine.setAttribute('x2', width - padding);
                gridLine.setAttribute('y1', y);
                gridLine.setAttribute('y2', y);
                gridLine.setAttribute('class', 'grid-line');
                svg.appendChild(gridLine);

                const value = maxValue - (maxValue / 4) * i;
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', padding - 10);
                label.setAttribute('y', y + 4);
                label.setAttribute('text-anchor', 'end');
                label.setAttribute('class', 'axis-label');
                label.textContent = formatNumber(Math.round(value));
                svg.appendChild(label);
            }

            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('x1', padding);
            xAxis.setAttribute('x2', width - padding);
            xAxis.setAttribute('y1', height - padding);
            xAxis.setAttribute('y2', height - padding);
            xAxis.setAttribute('class', 'axis-line');
            svg.appendChild(xAxis);

            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('x1', padding);
            yAxis.setAttribute('x2', padding);
            yAxis.setAttribute('y1', padding);
            yAxis.setAttribute('y2', height - padding);
            yAxis.setAttribute('class', 'axis-line');
            svg.appendChild(yAxis);

            const barWidth = (chartWidth / products.length) * 0.7;
            const barSpacing = (chartWidth / products.length);

            values.forEach((value, idx) => {
                const x = padding + barSpacing * idx + (barSpacing - barWidth) / 2;
                const barHeight = (value / maxValue) * chartHeight;
                const y = height - padding - barHeight;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', y);
                rect.setAttribute('width', barWidth);
                rect.setAttribute('height', barHeight);
                rect.setAttribute('fill', colors[idx % colors.length]);
                rect.setAttribute('rx', '4');
                rect.style.cursor = 'pointer';
                rect.style.transition = 'opacity 0.2s';

                rect.addEventListener('mouseenter', (e) => {
                    rect.style.opacity = '0.8';
                    showTooltip(e, `${products[idx]}: ${formatNumber(value)}원`);
                });
                rect.addEventListener('mouseleave', () => {
                    rect.style.opacity = '1';
                    hideTooltip();
                });

                svg.appendChild(rect);

                const productLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                productLabel.setAttribute('x', x + barWidth / 2);
                productLabel.setAttribute('y', height - padding + 20);
                productLabel.setAttribute('text-anchor', 'middle');
                productLabel.setAttribute('class', 'axis-label');
                productLabel.setAttribute('font-size', '11');
                productLabel.textContent = products[idx];
                svg.appendChild(productLabel);
            });
        }

        function showTooltip(e, text) {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.pageX + 10) + 'px';
            tooltip.style.top = (e.pageY - 30) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function renderStats(data) {
            const monthlyValues = Object.values(data.monthly);
            const productValues = Object.values(data.product);
            const totalSales = monthlyValues.reduce((a, b) => a + b, 0);
            const avgSales = Math.round(totalSales / monthlyValues.length);
            const topProduct = Object.entries(data.product).reduce((a, b) => b[1] > a[1] ? b : a)[0];
            const topProductSales = data.product[topProduct];

            const statsSection = document.getElementById('statsSection');
            statsSection.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${formatNumber(totalSales)}원</div>
                    <div class="stat-label">총 매출액</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${formatNumber(avgSales)}원</div>
                    <div class="stat-label">월 평균</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${topProduct}</div>
                    <div class="stat-label">최고 판매 제품</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${formatNumber(topProductSales)}원</div>
                    <div class="stat-label">제품 최고 매출</div>
                </div>
            `;
        }

        const rawData = parseCSV(csvData);
        const processedData = processData(rawData);

        drawLineChart(processedData.monthly);
        drawBarChart(processedData.product);
        renderStats(processedData);

        document.addEventListener('mousemove', (e) => {
            const tooltip = document.getElementById('tooltip');
            if (tooltip.style.display === 'block') {
                tooltip.style.left = (e.pageX + 10) + 'px';
                tooltip.style.top = (e.pageY - 30) + 'px';
            }
        });
    </script>
</body>
</html>
