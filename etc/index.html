<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김비서를 소개합니다</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9ff;
      --card-bg: rgba(255, 255, 255, 0.7);
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
      --shadow-hover: 0 12px 40px rgba(31, 38, 135, 0.25);
    }

    html.dark-mode {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a3a;
      --card-bg: rgba(255, 255, 255, 0.08);
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    html.dark-mode body {
      background: linear-gradient(135deg, #16213e 0%, #0f0f23 100%);
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 20px 40px;
      align-items: center;
    }

    .theme-toggle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-hover);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 30px;
      color: var(--text-primary);
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro-text {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 60px;
      line-height: 1.7;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-bottom: 80px;
    }

    .feature-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .feature-card h3 {
      font-size: 24px;
      margin-bottom: 15px;
      color: var(--text-primary);
    }

    .feature-card p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .cta-button {
      display: inline-block;
      padding: 16px 50px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
      border: none;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.4s ease;
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
    }

    .cta-button:hover::before {
      left: 100%;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .intro-text {
        font-size: 16px;
      }

      .header {
        padding: 15px 20px;
      }

      .container {
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </div>

  <div class="container">
    <h1>김비서를 소개합니다</h1>

    <p class="intro-text">
      당신의 업무를 효율적으로 관리하고, 일정을 체계적으로 추적하며,<br>
      프로젝트 진행 상황을 한눈에 파악할 수 있는 똑똑한 조수입니다.
    </p>

    <div class="features">
      <div class="feature-card">
        <h3>📋 업무 관리</h3>
        <p>할 일 목록을 우선순위별로 정리하고, 진행 상황을 실시간으로 추적합니다.</p>
      </div>

      <div class="feature-card">
        <h3>📅 일정 관리</h3>
        <p>주간 일정을 한눈에 보고, 중요한 회의와 마감일을 놓치지 않습니다.</p>
      </div>

      <div class="feature-card">
        <h3>📊 성과 분석</h3>
        <p>프로젝트 진행률과 매출 현황을 시각화하여 데이터 기반 의사결정을 지원합니다.</p>
      </div>
    </div>

    <a href="../tasks/dashboard.html" class="cta-button">내 대시보드 보기</a>
  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      html.classList.add('dark-mode');
      themeToggle.textContent = '☀️';
    }

    themeToggle.addEventListener('click', () => {
      html.classList.toggle('dark-mode');
      const isDarkMode = html.classList.contains('dark-mode');
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      themeToggle.textContent = isDarkMode ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
